name: Lenovo Tab E7 Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -a -f
          df -h

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y binutils-arm-linux-gnueabi build-essential \
          libstdc++6 git wget python3 repo libxml2-utils

      - name: Sync Minimal Manifest
        run: |
          mkdir ~/twrp && cd ~/twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0
          repo sync -j$(nproc --all) --no-clone-bundle --no-tags

      - name: Clone Device Tree
        run: |
          cd ~/twrp
          git clone https://github.com/${{ github.repository }} device/lenovo/TB7104F

      - name: Build TWRP
        run: |
          cd ~/twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch omni_TB7104F-eng
          mka recoveryimage -j$(nproc --all)

      - name: Upload Recovery
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-TB7104F
          path: /home/runner/twrp/out/target/product/TB7104F/recovery.img
